<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0033B3"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0E2FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>

  <!-- Background Icon Badge -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="10"/>

  <!-- Sleek Sports Car Body -->
  <path d="M 90 320 C 110 270 150 240 220 220 C 270 205 330 205 380 220 C 425 235 445 270 455 320 L 455 335 C 455 345 445 355 435 355 L 415 355 C 415 330 390 310 365 310 C 340 310 315 330 315 355 L 205 355 C 205 330 180 310 155 310 C 130 310 105 330 105 355 L 75 355 C 65 355 55 345 55 335 Z" fill="url(#carGrad)"/>

  <!-- Cabin Roofline & Window -->
  <path d="M 175 235 C 215 180 275 160 345 180 C 375 190 395 215 410 235 Z" fill="none" stroke="#0033B3" stroke-width="20" stroke-linecap="round"/>

  <!-- Fever Speed Streak -->
  <path d="M 85 285 Q 235 235 395 255" fill="none" stroke="url(#accentGrad)" stroke-width="16" stroke-linecap="round"/>

  <!-- Front Headlight Accent -->
  <path d="M 425 295 C 440 295 450 305 450 315 L 410 315 Z" fill="#FFCC00"/>

  <!-- Rear Taillight Accent -->
  <path d="M 60 305 L 90 305 L 85 320 L 60 320 Z" fill="#FF3B30"/>

  <!-- Wheels -->
  <circle cx="155" cy="355" r="40" fill="#0A1128" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="155" cy="355" r="18" fill="url(#bgGrad)"/>

  <circle cx="365" cy="355" r="40" fill="#0A1128" stroke="#FFFFFF" stroke-width="10"/>
  <circle cx="365" cy="355" r="18" fill="url(#bgGrad)"/>
</svg>
